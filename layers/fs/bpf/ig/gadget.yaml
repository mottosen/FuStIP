name: fs
description: Filesystem syscall tracing (enter/exit)
datasources:
  fs:
    fields:
      timestamp_ns:
        annotations:
          description: Event timestamp in nanoseconds
          columns.maxwidth: "24"
      event_type:
        annotations:
          description: "Event type: 0=enter, 1=exit"
      syscall:
        annotations:
          description: "Syscall index: 0=read .. 12=munmap"
      bytes:
        annotations:
          description: Byte count or return value
          columns.maxwidth: "20"
      latency_ns:
        annotations:
          description: Enter to exit latency in nanoseconds
          columns.maxwidth: "20"
      fd:
        annotations:
          description: File descriptor (-1 if N/A)
      offset:
        annotations:
          description: File offset (-1 if N/A)
          columns.maxwidth: "20"
      tid:
        annotations:
          description: Thread ID (correlation key)
      comm:
        annotations:
          description: Process name
          columns.maxwidth: "16"
      inflight:
        annotations:
          description: In-flight count for this syscall
